<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browser-based TR-808 drum machine clone with Web Audio synthesis, effects, and sequencer.">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>TR-808 Drum Machine Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TR-808 CLONE</h1>
            <div class="controls">
                <div class="control-group">
                    <div class="rotary-knob knob-lg">
                        <span class="rotary-label">TEMPO</span>
                        <div class="rotary-wrap">
                            <input type="range" id="tempo" min="60" max="180" value="120" data-sensitivity="300">
                            <div class="rotary-visual"></div>
                            <div class="rotary-indicator"></div>
                        </div>
                        <span class="rotary-value" id="tempo-display">120</span>
                    </div>
                    <div class="rotary-knob">
                        <span class="rotary-label">SWING</span>
                        <div class="rotary-wrap">
                            <input type="range" id="swing" min="0" max="75" value="0">
                            <div class="rotary-visual"></div>
                            <div class="rotary-indicator"></div>
                        </div>
                        <span class="rotary-value" id="swing-display">0%</span>
                    </div>
                    <div class="rotary-knob">
                        <span class="rotary-label">STEPS</span>
                        <div class="rotary-wrap">
                            <input type="range" id="steps" min="1" max="32" value="16">
                            <div class="rotary-visual"></div>
                            <div class="rotary-indicator"></div>
                        </div>
                        <span class="rotary-value" id="steps-display">16</span>
                    </div>
                    <div class="rotary-knob knob-lg">
                        <span class="rotary-label">VOLUME</span>
                        <div class="rotary-wrap">
                            <input type="range" id="master-vol" min="0" max="100" value="80">
                            <div class="rotary-visual"></div>
                            <div class="rotary-indicator"></div>
                        </div>
                    </div>
                </div>
                <div class="preset-control">
                    <label for="preset-select">PATTERN</label>
                    <select id="preset-select">
                        <option value="rock">Rock</option>
                        <option value="pop">Pop</option>
                        <option value="disco">Disco</option>
                        <option value="funk">Funk</option>
                        <option value="hiphop">Hip Hop</option>
                        <option value="reggae">Reggae</option>
                        <option value="samba">Samba</option>
                        <option value="bossanova">Bossa Nova</option>
                    </select>
                </div>
                <div class="voice-mode-control">
                    <label>MODE</label>
                    <button id="voice-mode-btn" class="voice-mode-btn">808</button>
                </div>
                <div class="playback-controls">
                    <button id="play-btn">PLAY</button>
                    <button id="stop-btn">STOP</button>
                    <button id="clear-btn">CLEAR</button>
                    <button id="random-btn" title="Randomize pattern">&#x1F3B2;</button>
                    <button id="export-btn" title="Export WAV">EXPORT</button>
                </div>
                <div class="color-picker-wrapper">
                    <button class="color-picker-toggle" id="color-toggle" title="Change colour"></button>
                    <div class="color-picker-popup" id="color-popup">
                        <canvas id="color-wheel" width="160" height="160"></canvas>
                        <div id="color-wheel-indicator"></div>
                    </div>
                </div>
                <div class="settings-wrapper">
                    <button class="settings-toggle" id="settings-toggle" title="Settings">&#x2699;</button>
                    <div class="settings-popup" id="settings-popup">
                        <div class="settings-row">
                            <span class="settings-label">Knob drag</span>
                            <select id="pref-knob-dir">
                                <option value="vertical">Up / Down</option>
                                <option value="horizontal">Left / Right</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="fx-strip">
            <div class="fx-group">
                <label class="fx-label">COMP</label>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">THRESH</span>
                    <div class="rotary-wrap">
                        <input type="range" id="comp-threshold" min="-60" max="0" value="-12" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">RATIO</span>
                    <div class="rotary-wrap">
                        <input type="range" id="comp-ratio" min="1" max="20" value="4" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">KNEE</span>
                    <div class="rotary-wrap">
                        <input type="range" id="comp-knee" min="0" max="40" value="10" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
            </div>
            <div class="fx-divider"></div>
            <div class="fx-group">
                <label class="fx-label">DIST</label>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">DRIVE</span>
                    <div class="rotary-wrap">
                        <input type="range" id="distortion-drive" min="0" max="100" value="0" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
            </div>
            <div class="fx-divider"></div>
            <div class="fx-group">
                <label class="fx-label">FILTER</label>
                <select id="filter-type">
                    <option value="lowpass">LP</option>
                    <option value="highpass">HP</option>
                    <option value="bandpass">BP</option>
                </select>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">CUTOFF</span>
                    <div class="rotary-wrap">
                        <input type="range" id="filter-cutoff" min="0" max="100" value="100" data-sensitivity="400">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">RES</span>
                    <div class="rotary-wrap">
                        <input type="range" id="filter-res" min="0" max="30" value="0" step="0.5" data-sensitivity="350">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
            </div>
            <div class="fx-divider"></div>
            <div class="fx-group">
                <label class="fx-label">REVERB</label>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">SIZE</span>
                    <div class="rotary-wrap">
                        <input type="range" id="reverb-size" min="0" max="100" value="40" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">MIX</span>
                    <div class="rotary-wrap">
                        <input type="range" id="reverb-mix" min="0" max="100" value="0" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
            </div>
            <div class="fx-divider"></div>
            <div class="fx-group">
                <label class="fx-label">DELAY</label>
                <select id="delay-time" class="delay-time-select">
                    <option value="0.25">1/4</option>
                    <option value="0.125" selected>1/8</option>
                    <option value="0.167">1/8T</option>
                    <option value="0.0625">1/16</option>
                    <option value="0.083">1/16T</option>
                </select>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">FB</span>
                    <div class="rotary-wrap">
                        <input type="range" id="delay-feedback" min="0" max="90" value="0" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
                <div class="rotary-knob knob-sm">
                    <span class="rotary-label">MIX</span>
                    <div class="rotary-wrap">
                        <input type="range" id="delay-mix" min="0" max="100" value="0" data-sensitivity="300">
                        <div class="rotary-visual"></div>
                        <div class="rotary-indicator"></div>
                    </div>
                </div>
            </div>
            <div class="fx-divider"></div>
            <div class="fx-group save-group">
                <label class="fx-label">SAVE</label>
                <button id="save-btn" class="save-load-btn" title="Save pattern">&#x1F4BE;</button>
                <select id="load-select" class="save-load-select">
                    <option value="">-- load --</option>
                </select>
                <button id="delete-btn" class="save-load-btn delete-btn" title="Delete saved pattern">&#x2715;</button>
            </div>
        </div>

        <canvas id="visualiser" width="800" height="60"></canvas>

        <div class="velocity-legend">
            <span>Left-click: cycle velocity (off / low / med / high)</span>
            <span>Right-click: cycle velocity down</span>
        </div>

        <main>
            <!-- Step numbers and drum rows are generated by js/sequencer.js -->
            <div class="sequencer"></div>
        </main>
    </div>

    <footer class="app-footer">
        <span id="app-version"></span> · &copy; MNCWare 2026
    </footer>

    <!-- Export dialog -->
    <div class="export-overlay" id="export-overlay">
        <div class="export-dialog">
            <h3>Export WAV</h3>
            <div class="export-row">
                <label for="export-loops">Loops</label>
                <input type="number" id="export-loops" min="1" max="16" value="1">
            </div>
            <div class="export-row">
                <label for="export-fx">FX</label>
                <button id="export-fx-toggle" class="export-toggle">OFF</button>
            </div>
            <div class="export-actions">
                <button id="export-go" class="export-action-btn">Export</button>
                <button id="export-cancel" class="export-action-btn export-cancel-btn">Cancel</button>
            </div>
            <div id="export-status" class="export-status"></div>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/presets.js"></script>
    <script src="js/euclidean.js"></script>
    <script src="js/rotary-knob.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/color-wheel.js"></script>
    <script src="js/visualiser.js"></script>
    <script src="js/wav-exporter.js"></script>
    <script src="js/sequencer.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
